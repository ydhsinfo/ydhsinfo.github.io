            groupOrder.forEach(g => {
                const btn = document.createElement('button');
                btn.className = 'filter-tab flex-shrink-0 px-4 py-2 rounded-full text-sm font-medium border border-gray-200 text-gray-600 hover:border-primary-300 hover:text-primary-700 bg-white' + (g === activeFilter ? ' active' : '');
                btn.textContent = g;
                btn.onclick = () => setFilter(g);
                container.appendChild(btn);
            });
        }

        // Set filter
        function setFilter(group) {
            activeFilter = group;
            activeTerm = -1;
            document.querySelectorAll('.filter-tab').forEach(btn => {
                btn.classList.toggle('active', btn.textContent === group);
            });
            renderTerms();
        }

        // Clear search
        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            searchText = '';
            document.getElementById('clearBtn').classList.add('hidden');
            document.getElementById('clearBtn').classList.remove('flex');
            renderTerms();
        }

        // Toggle term detail
        function toggleTerm(idx) {
            activeTerm = activeTerm === idx ? -1 : idx;
            renderTerms();
        }

        // Get filtered terms
        function getFilteredTerms() {
            return glossary.filter((item, idx) => {
                const matchGroup = activeFilter === '전체' || item.group === activeFilter;
                const matchSearch = !searchText || item.term.toLowerCase().includes(searchText.toLowerCase());
                return matchGroup && matchSearch;
            });
        }

        // Render terms
        function renderTerms() {
            const container = document.getElementById('termsContainer');
            const noResults = document.getElementById('noResults');
            const resultsCount = document.getElementById('resultsCount');

            const filtered = getFilteredTerms();

            resultsCount.textContent = `검색 결과: ${filtered.length}개 용어`;

            if (filtered.length === 0) {
                container.innerHTML = '';
                noResults.classList.remove('hidden');
                return;
            }
            noResults.classList.add('hidden');

            // Group filtered terms
            const groups = {};
            filtered.forEach(item => {
                if (!groups[item.group]) groups[item.group] = [];
                groups[item.group].push(item);
            });

            // Render order (skip 전체)
            const renderOrder = groupOrder.filter(g => g !== '전체');
            let html = '';

            renderOrder.forEach(g => {
                if (!groups[g]) return;
                const items = groups[g];

                html += `<div class="bg-white rounded-2xl shadow-sm overflow-hidden">`;
                html += `<div class="px-5 sm:px-6 pt-5 pb-3 border-b border-gray-100">`;
                html += `<div class="flex items-center gap-3">`;
                html += `<span class="w-10 h-10 rounded-xl bg-primary-500 text-white flex items-center justify-center font-bold text-lg">${g}</span>`;
                html += `<span class="text-sm text-gray-400 font-medium">${items.length}개 용어</span>`;
                html += `</div></div>`;
                html += `<div class="px-5 sm:px-6 py-4">`;
                html += `<div class="flex flex-wrap gap-2">`;

                items.forEach(item => {
                    const globalIdx = glossary.indexOf(item);
                    const isActive = activeTerm === globalIdx;

                    html += `<button onclick="toggleTerm(${globalIdx})" class="term-chip px-3.5 py-1.5 rounded-full text-sm font-medium border ${isActive ? 'active' : 'border-gray-200 text-gray-700 bg-gray-50'}">`;
                    html += escapeHtml(item.term);
                    html += `</button>`;
                });

                html += `</div>`;

                // Show detail card if active term is in this group
                items.forEach(item => {
                    const globalIdx = glossary.indexOf(item);
                    if (activeTerm === globalIdx) {
                        html += `<div class="term-detail mt-4 p-4 bg-gray-50 rounded-xl border border-gray-100">`;
                        html += `<h4 class="font-bold text-gray-800 mb-3 text-base">${escapeHtml(item.term)}</h4>`;
                        html += `<div class="space-y-2.5">`;

                        item.refs.forEach(r => {
                            const info = unitInfo[r.unit];
                            html += `<div class="flex items-start sm:items-center justify-between gap-3 flex-col sm:flex-row bg-white rounded-lg p-3 border border-gray-100">`;
                            html += `<div class="flex items-center gap-2.5 min-w-0">`;
                            html += `<span class="w-3 h-3 rounded-full flex-shrink-0" style="background-color: ${info.color}"></span>`;
                            html += `<span class="text-sm text-gray-700"><span class="font-semibold" style="color: ${info.color}">${info.roman}. ${info.name}</span>`;
                            html += ` <span class="text-gray-400 mx-1">&rsaquo;</span> ${escapeHtml(r.section)}</span>`;
                            html += `</div>`;
                            html += `<a href="${r.url}" class="inline-flex items-center gap-1.5 text-sm font-medium text-primary-600 hover:text-primary-700 flex-shrink-0 transition-colors">`;
                            html += `바로가기 <i class="fas fa-arrow-right text-xs"></i></a>`;
                            html += `</div>`;
                        });

                        html += `</div></div>`;
                    }
                });

                html += `</div></div>`;
            });

            container.innerHTML = html;
        }

        // Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Search input listener
        document.getElementById('searchInput').addEventListener('input', function(e) {
            searchText = e.target.value.trim();
            const clearBtn = document.getElementById('clearBtn');
            if (searchText) {
                clearBtn.classList.remove('hidden');
                clearBtn.classList.add('flex');
            } else {
                clearBtn.classList.add('hidden');
                clearBtn.classList.remove('flex');
            }
            activeTerm = -1;
            renderTerms();
        });

        // IntersectionObserver for fade-in
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                    observer.unobserve(entry.target);
                }
            });
        }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // Init
        buildFilterTabs();
        renderTerms();
    </script>
</body>
</html>
